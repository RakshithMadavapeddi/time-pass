  <template id="tpl-registration">
    <style>
:root{
      --bg:#f2f2f2;
      --surface:#ffffff;
      --surface-2:#e1e1e1;
      --border:#d9d9d9;
      --text:#1e1e1e;
      --muted:#b3b3b3;
      --brand:#2c2c2c;

      --pad:24px;
      --gap:24px;
      --radius:8px;
      --radius-sm:4px;
      --shadow:0px 1px 2px rgba(0,0,0,.30), 0px 1px 3px rgba(0,0,0,.15);

      /* Scanner vars (copied from scanner.html) */
      --scanner-overlay:rgba(0,0,0,.45);
      --scanner-radius:4px;
    }

    *{ box-sizing:border-box; }
    html, body { height:100%; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* Centered mobile frame (matches 393px artboard) */
    .app{
      min-height:100vh;
      display:flex;
      justify-content:center;
    }
    .frame{
      width:100%;
      max-width:393px;
      min-height:100vh;
      background:var(--bg);
      display:flex;
      flex-direction:column;
      position:relative;
      overflow:hidden;
    }

    /* Top App Bar */
    .topbar{
      background:var(--surface);
      padding:var(--pad);
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .icon-btn{
      width:24px;
      height:24px;
      border:0;
      padding:0;
      background:transparent;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .icon-btn img{ width:24px; height:24px; display:block; }
    .title{
      font-weight:700;
      font-size:20px;
      line-height:1.2;
      text-align:center;
      white-space:nowrap;
      margin:0;
    }

    /* Progress Bar */
    .progress{
      height:4px;
      width:100%;
      background:var(--surface-2);
      display:flex;
      overflow:hidden;
    }
    .step{ flex:1; }
    .step.is-active{ background:#000; }

    /* Body */
    .content{
      flex:1;
      padding:var(--pad);
      display:flex;
      flex-direction:column;
      gap:var(--gap);
      overflow:auto;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      width:100%;
    }
    .label{
      font-weight:600;
      font-size:16px;
      line-height:1.4;
    }

    .control{
      width:100%;
      height:40px;
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      background:#fff;
      padding:12px 16px;
      font-size:16px;
      line-height:1;
      outline:none;
    }
    .control::placeholder{ color:var(--muted); }
    select.control{
      padding-right:40px;
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      background-image: url("https://www.figma.com/api/mcp/asset/664fe063-f55f-4c3e-b37e-c47458749b4c");
      background-repeat:no-repeat;
      background-position: right 12px center;
      background-size:10px 6px;
    }

    .row{
      display:flex;
      gap:24px;
      width:100%;
    }
    .row .field{ flex:1; min-width:0; }

    /* Bottom App Bar */
    .bottombar{
      background:var(--surface);
      padding:var(--pad);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .primary-btn{
      width:100%;
      border:1px solid var(--brand);
      background:var(--brand);
      color:#f5f5f5;
      padding:12px;
      border-radius:var(--radius);
      font-size:16px;
      line-height:1;
      cursor:pointer;
    }
    .primary-btn:active{ transform: translateY(1px); }

    /* Optional: nice focus */
    .control:focus, .primary-btn:focus, .icon-btn:focus{
      outline: 2px solid rgba(0,0,0,0.25);
      outline-offset: 2px;
    }

    /* =========================
       Scanner overlay (UI copied from scanner.html; no visual changes)
       ========================= */
    .scanner-screen{
      position:absolute;
      inset:0;
      background:var(--bg);
      display:none;
      flex-direction:column;
      z-index:10;
    }
    .scanner-screen.is-open{ display:flex; }

    /* ===== Top App Bar (scanner.html styles) ===== */
    .scanner-screen .topbar{
      background:var(--surface);
      padding:var(--pad);
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:var(--shadow);
    }
    .scanner-screen .title{
      font-weight:700;
      font-size:20px;
      margin:0;
    }
    .scanner-screen .icon-btn{
      background:transparent;
      border:0;
      padding:4px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .scanner-screen .icon-btn img{
      display:block;
    }
    img.icon-close{ width:14px; height:14px; }
    img.icon-flash{ width:18px; height:18px; }

    /* ===== Camera Area (scanner.html styles) ===== */
    .camera-area{
      flex:1;
      background:#000;
      position:relative;
      overflow:hidden;
      padding:0 var(--pad);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .camera-preview{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      background:#000;
    }
    .scan-window{
      position:relative;
      width:100%;
      height:240px;
      z-index:2;
    }
    .alignment-guide{
      position:absolute;
      inset:0;
      border:1px solid #fff;
      border-radius:var(--scanner-radius);
      pointer-events:none;
      z-index:3;
    }
    .scan-window::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:var(--scanner-radius);
      box-shadow:0 0 0 9999px var(--scanner-overlay);
      pointer-events:none;
      z-index:2;
    }
    .flash-active{
      filter:brightness(1.3);
    }

    /* hidden canvas for ZXing fallback */
    #scanCanvas{ display:none; }
    </style>
